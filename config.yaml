baseURL: "https://benedictschweiger.com/"
languageCode: "en"
title: "Benedict Schweiger — Agentic Marketing"
theme: "PaperMod"

# SEO defaults
params:
  description: "Building the Agentic Marketing OS in public. Real systems, real numbers, what actually compounds. CMO, ex-Simon-Kucher."
  author: "Benedict Schweiger"
  images:
    - "/images/og-default.png"
  keywords:
    - "agentic marketing"
    - "marketing automation AI"
    - "marketing systems"
    - "AI marketing team"
    - "Benedict Schweiger"

  # Site stats — updated by website_flow.py update_stats()
  stats:
    organic_views: "5.8M"
    roas_built: "8→20"
    youtube_share: "34%"
    audit_roi: "+463%"

  # Social
  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/benedictschweiger"
    - name: youtube
      url: "https://www.youtube.com/channel/UCoCNyB7omxposyGloac8cA"
    - name: email
      url: "mailto:benedictschweiger@gmail.com"

  # PaperMod blog config
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  defaultTheme: "light"
  disableThemeToggle: true

  homeInfoParams:
    Title: ""
    Content: ""

  label:
    text: "Benedict Schweiger"
    icon: ""
    iconHeight: 32

# Blog section
menu:
  main:
    - name: Blog
      url: /blog/
      weight: 10
    - name: Free Diagnostic
      url: "#diagnostics"
      weight: 20

# Blog content lives in content/blog/
permalinks:
  blog: "/blog/:slug/"

outputs:
  home:
    - HTML
    - RSS
    - Sitemap

markup:
  goldmark:
    renderer:
      unsafe: true

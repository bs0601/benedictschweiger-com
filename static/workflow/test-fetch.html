<!DOCTYPE html>
<html>
<head><title>Fetch Test</title></head>
<body>
<h1>Fetch Test</h1>
<div id="result">Loading...</div>
<script>
async function test() {
    try {
        const res = await fetch('/workflow/dashboard-metrics.json?t=' + Date.now());
        document.getElementById('result').innerHTML = 'Status: ' + res.status + '<br>OK: ' + res.ok;
        if (res.ok) {
            const data = await res.json();
            document.getElementById('result').innerHTML += '<br>Blog views: ' + data.blog.pageviews_28d;
        }
    } catch (e) {
        document.getElementById('result').innerHTML = 'Error: ' + e.message;
    }
}
test();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#FFFFFF"/>
<meta name="robots" content="noindex"/>
<title>Confirmed · Benedict Schweiger</title>
<meta http-equiv="refresh" content="2;url=/training/"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--paper:#FFFFFF;--ink:#1D1D1F;--sub:#6E6E73;--hair:#D2D2D7;--accent:#B8593A;--accent-text:#A8502F}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{background:var(--paper)}
body{font-family:"Hanken Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45}
main{max-width:640px;margin:0 auto;padding:128px 24px;text-align:center}
h1{font-size:clamp(32px,6vw,44px);font-weight:600;line-height:1.1;letter-spacing:-.022em;margin-bottom:16px}
p{font-size:19px;line-height:1.55;color:var(--sub);margin-bottom:32px}
a{color:var(--accent-text);font-weight:600;text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>
<main>
  <h1>Confirmed. You're in.</h1>
  <p>Taking you to the training now.</p>
  <a href="/training/">Open the training</a>
</main>
<script>setTimeout(function(){window.location.href="/training/";},1500);</script>
</body>
</html>

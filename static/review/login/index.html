<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Review Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      font-size: 28px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e8e8e0;
      margin-bottom: 4px;
    }
    p {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #e07428; }
    button {
      width: 100%;
      padding: 13px;
      background: #e07428;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #c96420; }
    .error {
      background: #2a1010;
      border: 1px solid #5a2020;
      color: #f87171;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>Review Dashboard</h1>
    <p>Enter password to access draft content.</p>

    <div class="error" id="error">Wrong password. Try again.</div>

    <form method="POST" action="/.netlify/functions/review-login">
      <input type="hidden" name="next" id="next-input" value="/review/">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" autofocus placeholder="••••••••••••">
      <button type="submit">Access Review →</button>
    </form>
  </div>

  <script>
    // Show error if redirected back with error param
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error').classList.add('visible');
    }
    // Pass ?next= through to the form
    const nextParam = new URLSearchParams(location.search).get('next');
    if (nextParam) document.getElementById('next-input').value = nextParam;
  </script>
</body>
</html>

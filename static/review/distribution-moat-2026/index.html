<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Review: Distribution is the moat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e0; min-height: 100vh; padding: 24px 16px 120px; }
    .header { max-width: 700px; margin: 0 auto 28px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #888; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; background: #1a2a3a; color: #60a5fa; margin-bottom: 10px; }
    .card { max-width: 700px; margin: 0 auto 20px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; font-size: 13px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: .5px; }
    .slides-area { padding: 20px; }
    .caption-area { padding: 16px 20px; border-top: 1px solid #2a2a2a; }
    .caption-area h3 { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
    .caption-area p { font-size: 14px; line-height: 1.75; color: #ccc; white-space: pre-wrap; }
    .approval-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 1px solid #2a2a2a; padding: 16px 20px; z-index: 100; }
    .approval-inner { max-width: 700px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
    .feedback-area { flex: 1; }
    .feedback-area label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 6px; }
    textarea { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; color: #e8e8e0; font-size: 13px; padding: 10px 14px; resize: none; height: 44px; outline: none; font-family: inherit; }
    textarea:focus { border-color: #e07428; height: 80px; }
    .btn { padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; white-space: nowrap; }
    .btn-approve { background: #16a34a; color: #fff; }
    .btn-revise { background: #2a2a2a; color: #e8e8e0; border: 1px solid #3a3a3a; }
    .btn-delete { background: transparent; color: #ef4444; border: 1px solid #3a2020; }
    .toast { position: fixed; top: 24px; right: 24px; background: #1a1a1a; border: 1px solid #333; color: #e8e8e0; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; }
    .toast.show { opacity: 1; }
    @media (max-width: 640px) {
      body { padding: 16px 12px 200px; }
      .approval-inner { flex-wrap: wrap; }
      .feedback-area { flex: 1 1 100%; order: 1; }
      .btn-revise { order: 2; flex: 1; }
      .btn-approve { order: 3; flex: 1; }
      .btn-delete { order: 4; }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="header">
    <div class="badge">LinkedIn Carousel</div>
    <h1>Review: Distribution is the moat</h1>
    <p>Slug: distribution-moat-2026</p>
  </div>
  <div class="card">
    <div class="card-header">🖼 Slides</div>
    <div class="slides-area"><img src="/images/carousels/distribution-moat-2026/slide_01.png" style="width:100%;border-radius:8px;margin-bottom:12px;display:block;" alt="Slide 1">
<img src="/images/carousels/distribution-moat-2026/slide_02.png" style="width:100%;border-radius:8px;margin-bottom:12px;display:block;" alt="Slide 2">
<img src="/images/carousels/distribution-moat-2026/slide_03.png" style="width:100%;border-radius:8px;margin-bottom:12px;display:block;" alt="Slide 3">
<img src="/images/carousels/distribution-moat-2026/slide_04.png" style="width:100%;border-radius:8px;margin-bottom:12px;display:block;" alt="Slide 4">
<img src="/images/carousels/distribution-moat-2026/slide_05.png" style="width:100%;border-radius:8px;margin-bottom:12px;display:block;" alt="Slide 5"></div>
    <div class="caption-area">
      <h3>LinkedIn Caption</h3>
      <p>

</p>
    </div>
  </div>
  <div class="approval-bar">
    <div class="approval-inner">
      <div class="feedback-area">
        <label>Feedback / Revision notes</label>
        <textarea id="feedback" placeholder="Optional — leave blank to approve as-is…"></textarea>
      </div>
      <button class="btn btn-revise" onclick="send('revise')">🔄 Revise</button>
      <button class="btn btn-approve" onclick="send('approve')">✅ Approve</button>
      <button class="btn btn-delete" onclick="send('delete')">🗑</button>
    </div>
  </div>
  <script>
    const SLUG = 'distribution-moat-2026', TYPE = 'carousel';
    function showToast(msg, d=3000) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), d);
    }
    async function send(action) {
      const feedback = document.getElementById('feedback').value.trim();
      if (action === 'revise' && !feedback) { showToast('Add revision notes first.'); return; }
      try {
        const res = await fetch('/.netlify/functions/content-approval', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ action, slug: SLUG, type: TYPE, feedback })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        if (action === 'approve') {
          showToast('✅ Approved!', 4000);
          try { const r = JSON.parse(sessionStorage.getItem('review_resolved')||'{}'); r[SLUG]={status:'approved',ts:Date.now()}; sessionStorage.setItem('review_resolved',JSON.stringify(r)); } catch {}
          setTimeout(() => window.location.href = '/review/', 2000);
        } else if (action === 'delete') {
          showToast('🗑 Removed.');
          try { const r = JSON.parse(sessionStorage.getItem('review_resolved')||'{}'); r[SLUG]={status:'deleted',ts:Date.now()}; sessionStorage.setItem('review_resolved',JSON.stringify(r)); } catch {}
          setTimeout(() => window.location.href = '/review/', 1500);
        } else { showToast('🔄 Revision requested.'); }
      } catch(e) { showToast('Error: ' + e.message); }
    }
  </script>
</body>
</html>

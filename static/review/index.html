<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Content Review — Benedict Schweiger</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #F5F4F0; color: #1a1a1a; min-height: 100vh; }
  header { background: #1a1a1a; color: #fff; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; }
  .count-badge { background: #C4622D; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
  .count-badge.zero { background: #2a7a4e; }
  .container { max-width: 800px; margin: 0 auto; padding: 40px 24px 60px; }
  .empty { text-align: center; padding: 80px 0; color: #888; font-size: 15px; }
  .empty strong { display: block; font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
  .items { display: flex; flex-direction: column; gap: 12px; }
  .item { background: #fff; border-radius: 10px; padding: 20px 24px; display: flex; align-items: center; gap: 16px; border: 2px solid transparent; transition: border-color .15s, opacity .3s; }
  .item:not(.resolved):hover { border-color: #C4622D; }
  .item.resolved { opacity: 0.5; background: #f0f0ec; }
  .item a { display: contents; color: inherit; text-decoration: none; }
  .badge { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
  .badge-blog { background: #e8f0fe; color: #3949ab; }
  .badge-social { background: #fef3e2; color: #e65100; }
  .badge-linkedin { background: #e3f2fd; color: #1565c0; }
  .badge-carousel { background: #fef3e2; color: #e65100; }
  .badge-newsletter { background: #e8f5ee; color: #2a7a4e; }
  .item-info { flex: 1; min-width: 0; }
  .item-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .item-meta { font-size: 12px; color: #888; }
  .status-chip { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
  .status-approved { background: #e8f5ee; color: #2a7a4e; }
  .status-deleted { background: #f5f5f5; color: #999; }
  .arrow { color: #ccc; font-size: 18px; flex-shrink: 0; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #888; margin-bottom: 12px; margin-top: 32px; }
  .section-title:first-child { margin-top: 0; }
  .btn-delete { background: none; border: none; cursor: pointer; font-size: 16px; padding: 8px; border-radius: 6px; color: #bbb; transition: color .15s, background .15s; flex-shrink: 0; }
  .btn-delete:hover { color: #e65100; background: #fef3e2; }
  @media (max-width: 640px) {
    header { padding: 16px 20px; }
    .container { padding: 24px 16px 40px; }
    .item { padding: 16px 18px; gap: 12px; }
    .item-title { font-size: 14px; }
  }
</style>
</head>
<body>
<header>
  <h1>Content Review</h1>
  <span class="count-badge" id="count">Loading…</span>
</header>
<div class="container" id="app">
  <p style="color:#888;font-size:14px">Loading pending reviews…</p>
</div>
<script>
const BADGE_CLASS = {
  blog: 'badge-blog', social: 'badge-social', linkedin: 'badge-linkedin',
  carousel: 'badge-carousel', newsletter: 'badge-newsletter'
};

// sessionStorage: { [slug]: { status: 'approved'|'deleted', ts: number } }
function getResolved() {
  try {
    const raw = sessionStorage.getItem('review_resolved');
    if (!raw) return {};
    const data = JSON.parse(raw);
    // Prune entries older than 4 hours
    const cutoff = Date.now() - 4 * 60 * 60 * 1000;
    Object.keys(data).forEach(k => { if (data[k].ts < cutoff) delete data[k]; });
    return data;
  } catch { return {}; }
}

async function load() {
  try {
    const res = await fetch('/.netlify/functions/get-pending?t=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const items = await res.json();
    const resolved = getResolved();
    render(items, resolved);
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="empty"><strong>All clear ✓</strong>Nothing pending review right now.</div>`;
    document.getElementById('count').textContent = '0 pending';
    document.getElementById('count').className = 'count-badge zero';
  }
}

async function deleteItem(slug, btn) {
  const row = btn.closest('.item');
  row.style.opacity = '0.4';
  row.style.pointerEvents = 'none';
  try {
    await fetch('/.netlify/functions/content-approval', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', slug })
    });
  } catch(e) { console.error(e); }
  markResolved(slug, 'deleted');
  row.remove();
  updateCount();
}

function markResolved(slug, status) {
  try {
    const data = getResolved();
    data[slug] = { status, ts: Date.now() };
    sessionStorage.setItem('review_resolved', JSON.stringify(data));
  } catch {}
}

function updateCount() {
  const pending = document.querySelectorAll('.item:not(.resolved)').length;
  const el = document.getElementById('count');
  el.textContent = pending + ' pending';
  el.className = 'count-badge' + (pending === 0 ? ' zero' : '');
  if (!pending && !document.querySelectorAll('.item.resolved').length) {
    document.getElementById('app').innerHTML =
      `<div class="empty"><strong>All clear ✓</strong>Nothing pending review right now.</div>`;
  }
}

function render(items, resolved) {
  const pending = items.filter(i => !resolved[i.slug]);
  const recentlyResolved = items.filter(i => resolved[i.slug])
    .concat(
      Object.keys(resolved)
        .filter(slug => !items.find(i => i.slug === slug))
        .map(slug => ({ slug, _resolvedOnly: true, ...resolved[slug] }))
    );

  const countEl = document.getElementById('count');
  countEl.textContent = pending.length + ' pending';
  countEl.className = 'count-badge' + (pending.length === 0 ? ' zero' : '');

  if (!pending.length && !recentlyResolved.length) {
    document.getElementById('app').innerHTML =
      `<div class="empty"><strong>All clear ✓</strong>Nothing pending review right now.</div>`;
    return;
  }

  const app = document.getElementById('app');
  app.innerHTML = '';

  if (pending.length) {
    const section = document.createElement('div');
    section.innerHTML = '<div class="section-title">Awaiting your review</div><div class="items" id="pending-list"></div>';
    app.appendChild(section);
    const list = section.querySelector('#pending-list');
    pending.forEach(item => list.appendChild(makeCard(item, null)));
  }

  if (recentlyResolved.length) {
    const section = document.createElement('div');
    section.innerHTML = '<div class="section-title" style="margin-top:32px">Recently resolved</div><div class="items" id="resolved-list"></div>';
    app.appendChild(section);
    const list = section.querySelector('#resolved-list');
    recentlyResolved.forEach(item => {
      const status = resolved[item.slug]?.status || item.status;
      list.appendChild(makeCard(item, status));
    });
  }
}

function makeCard(item, resolvedStatus) {
  const row = document.createElement('div');
  row.className = 'item' + (resolvedStatus ? ' resolved' : '');
  const badgeClass = BADGE_CLASS[item.type] || 'badge-blog';
  const typeLabel = item.type || 'blog';
  const title = item.title || item.slug;
  const meta = [item.pillar, item.created].filter(Boolean).join(' · ');

  let rightEl = '';
  if (resolvedStatus === 'approved') {
    rightEl = `<span class="status-chip status-approved">✅ Published</span>`;
  } else if (resolvedStatus === 'deleted') {
    rightEl = `<span class="status-chip status-deleted">🗑 Removed</span>`;
  } else {
    rightEl = `
      <a href="/review/${item.slug}/" aria-label="Review"><span class="arrow">›</span></a>
      <button class="btn-delete" title="Remove from queue" onclick="deleteItem('${item.slug}', this)">🗑️</button>`;
  }

  const titleLink = resolvedStatus
    ? `<div class="item-title">${title}</div>`
    : `<a href="/review/${item.slug}/"><div class="item-title">${title}</div></a>`;

  row.innerHTML = `
    <span class="badge ${badgeClass}">${typeLabel}</span>
    <div class="item-info">
      ${titleLink}
      ${meta ? `<div class="item-meta">${meta}</div>` : ''}
    </div>
    ${rightEl}`;
  return row;
}

load();
</script>
</body>
</html>
